name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - run: pnpm --filter @csvshape/core pack:check
      - uses: actions/upload-artifact@v4
        with:
          name: csvshape-core-pack-check
          path: |
            docs/qc/benchmarks/core-pack.json
            packages/core/dist/**
            packages/core/README.md
